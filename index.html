function calculate(answers) {
  // answers: [+2, +1, -1, -2, ...] 길이 12
  const sumA = answers.slice(0, 4).reduce((s, v) => s + v, 0);
  const sumB = answers.slice(4, 8).reduce((s, v) => s + v, 0);
  const sumC = answers.slice(8, 12).reduce((s, v) => s + v, 0);
  // 합이 0일 경우 마지막 응답 부호 사용 (0 회피 — 중립 없음 원칙 보존)
  const resolveZero = (sum, last) => sum === 0 ? (Math.sign(last) || 1) : sum;
  const finalA = resolveZero(sumA, answers[3]);
  const finalB = resolveZero(sumB, answers[7]);
  const finalC = resolveZero(sumC, answers[11]);
  const code =
    (finalA > 0 ? 'T' : 'B') +
    (finalB > 0 ? 'I' : 'O') +
    (finalC > 0 ? 'S' : 'C');
  // 절댓값 ≤1: 경계값 → 인접 유형 안내
  const isBoundary = [sumA, sumB, sumC].some(s => Math.abs(s) <= 1);
  return { code, sumA, sumB, sumC, isBoundary };
}
